<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه ورود</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url("360_F_143361512_UJBrJy2BGlZTosDJ7blza8x26W2FkDQ4.jpg");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .25);
        }

        .login-box {
            background: rgba(255, 255, 255, .85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, .2);
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .35);
            position: relative;
            z-index: 1;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #fabb34de;
        }

        .input-group input::placeholder {
            color: #777;
        }

        .forgot {
            text-align: right;
            margin-bottom: 15px;
        }

        .forgot a {
            color: #000;
            text-decoration: none;
            font-size: 12px;
        }

        button {
            transition: .3s;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ff7b00;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #e66d00;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, .5);
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            text-decoration: none;
            color: #000;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>ورود به حساب</h2>

        <div class="input-group">
            <input type="text" placeholder="نام کاربری" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="رمز عبور" required minlength="8">
        </div>

        <div class="forgot">
            <a href="#">رمز عبور را فراموش کرده ام</a>
        </div>

        <button>ورود</button>

        <div class="link">
            <a href="#">ثبت نام</a>
        </div>
    </div>

</body>

</html>
